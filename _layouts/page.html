---
layout: default
---

<section class="page-shell">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="page-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>
  <div class="content{% if page.wide %} content-wide{% endif %}">
    {{ content }}
  </div>
</section>
